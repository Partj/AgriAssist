{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="fw-bold serif-title mb-4">Financial Ledger (Khata)</h2>
        
        <div class="card p-4 mb-4 border-0" style="background-color: var(--bg-color);">
            <form action="/khata" method="POST" class="row g-3">
                <div class="col-md-5">
                    <input type="text" name="item_name" class="form-control bg-white border-0 py-2 rounded-3" placeholder="Expense or Income Detail" required>
                </div>
                <div class="col-md-3">
                    <input type="number" name="amount" class="form-control bg-white border-0 py-2 rounded-3" placeholder="Amount (₹)" required>
                </div>
                <div class="col-md-3">
                    <select name="transaction_type" class="form-select bg-white border-0 py-2 rounded-3">
                        <option value="Expense">Expense</option>
                        <option value="Income">Income</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-dark w-100 py-2 rounded-3"><i class="fa-solid fa-plus"></i></button>
                </div>
            </form>
        </div>

        <div class="card p-4 border-0">
            {% for entry in entries %}
            <div class="d-flex align-items-center justify-content-between border-bottom py-3">
                <div class="d-flex align-items-center">
                    <i class="fa-solid {% if entry.transaction_type == 'Income' %}fa-circle-plus text-success{% else %}fa-circle-minus text-danger{% endif %} fs-4 me-3"></i>
                    <div>
                        <h6 class="mb-0 fw-bold">{{ entry.item_name }}</h6>
                        <small class="text-muted">{{ entry.transaction_type }}</small>
                    </div>
                </div>
                <div class="d-flex align-items-center">
                    <h5 class="mb-0 serif-title fw-bold me-4">₹{{ entry.amount }}</h5>
                    <form action="/delete_khata/{{ entry.id }}" method="POST">
                        <button type="submit" class="btn btn-link text-danger p-0"><i class="fa-solid fa-trash"></i></button>
                    </form>
                </div>
            </div>
            {% else %}
            <p class="text-center text-muted my-4">Your ledger is empty.</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
