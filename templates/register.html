{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="col-md-4">
        <div class="card p-5 shadow-lg border-0" style="border-radius: 20px; background-color: #ffffff;">
            <h2 class="serif-title fw-bold text-center mb-1 text-dark">Join AgriAssist</h2>
            <p class="text-muted text-center small mb-5">Create your farm workspace</p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger py-2 small border-0 mb-4 text-center rounded-3" style="background-color: #FCE8E8; color: #d93025;">
                    <i class="fa-solid fa-circle-exclamation me-2"></i> {{ messages[0] }}
                </div>
              {% endif %}
            {% endwith %}

            <form action="/register" method="POST">
                <div class="mb-3">
                    <input type="text" name="name" class="form-control bg-light border-0 rounded-3 py-3" placeholder="Full Name" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="phone" class="form-control bg-light border-0 rounded-3 py-3" placeholder="Phone Number" required>
                </div>
                <div class="mb-4">
                    <input type="password" name="password" class="form-control bg-light border-0 rounded-3 py-3" placeholder="Create Password" required>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3 rounded-4 fs-6 serif-title">
                    Create Account
                </button>
            </form>
            
            <p class="text-center mt-4 small mb-0">
                <span class="text-muted">Already have an account?</span> 
                <a href="/login" class="text-decoration-none fw-bold" style="color: var(--primary);">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
