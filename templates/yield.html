{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="fw-bold serif-title mb-4">Yield Forecasting</h2>
        <div class="card p-5 border-0">
            <form action="/yield" method="POST" class="row g-4">
                <div class="col-md-6">
                    <label class="form-label small text-muted text-uppercase fw-bold">Crop Type</label>
                    <select name="crop" class="form-select bg-light border-0 rounded-3 py-2">
                        <option value="Wheat">Wheat</option>
                        <option value="Rice">Rice</option>
                        <option value="Maize">Maize</option>
                        <option value="Sugarcane">Sugarcane</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small text-muted text-uppercase fw-bold">Location</label>
                    <input type="text" name="city" class="form-control bg-light border-0 rounded-3 py-2" value="{{ current_user.city }}">
                </div>
                <div class="col-md-4"><input type="number" step="0.1" name="nitrogen" class="form-control bg-light border-0 rounded-3" value="{{ current_user.n_level }}"></div>
                <div class="col-md-4"><input type="number" step="0.1" name="phosphorus" class="form-control bg-light border-0 rounded-3" value="{{ current_user.p_level }}"></div>
                <div class="col-md-4"><input type="number" step="0.1" name="potassium" class="form-control bg-light border-0 rounded-3" value="{{ current_user.k_level }}"></div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary-custom w-100 py-3 rounded-4 fs-5 serif-title">Run Simulation</button>
                </div>
            </form>
            
            {% if result %}
            <div class="mt-5 text-center p-4 rounded-4" style="background-color: var(--secondary);">
                <p class="text-uppercase small fw-bold text-muted mb-1">Estimated Output</p>
                <h1 class="display-3 serif-title fw-bold text-dark">{{ result.yield }} <span class="fs-4">kg/acre</span></h1>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
